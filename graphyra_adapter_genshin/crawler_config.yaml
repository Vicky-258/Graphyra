crawler:
  # Mode options: development, seeded, full
  mode: seeded

  include_namespaces:
    - Main

  exclude_prefixes:
    - Achievement
    - Category
    - Template
    - Help
    - User
    - Talk
    - File
    - Special
    - MediaWiki

  exclude_patterns:
    - "Version *"
    - "* Release Notes"
    - "* (Support Card)"
    - "* (Achievement)"
    - "* (Achievement) *"
    - "* (Tier *)"

  # Seed pages only active when mode: seeded
  seed_pages:
    - Nahida
    - Raiden Ei
    - Zhongli
    - Venti
    - Furina
    - Traveler
    - Irminsul
    - Sumeru
    - Liyue
    - Mondstadt
    - Inazuma
    - Fontaine

  max_pages: 500
